#
# define display information
#
name: Filter Nanopore Reads with NanoFilt

tooltip: |
    Perform filtering on Nanopore reads using NanoFilt.

screenshots: []

icon: icon.png

#
# define a set of similar apps that might be useful to the user
#
suggestions:
    apps:
        related:
            [app1, app2]
        next:
            [app3, app4]

#
# Configure the display and description of parameters
#
parameters :
    input_reads_ref : # Should be able to accept more than one file
        ui-name : Input Reads
        short-hint : |
            Reads to error correct
        long-hint  : |
            Illumina reads to error correct.

    length :
        ui-name : |
            Minimum Length
        short-hint : |
            Minimum length of reads to keep
        long-hint : |
            Minimum length of reads to keep. Reads shorter than this will be discarded.
            If you do not want to filter reads by length, leave this blank.
    
    maxlength :
        ui-name : |
            Maximum Length
        short-hint : |
            Maximum length of reads to keep
        long-hint : |
            Maximum length of reads to keep. Reads longer than this will be discarded.
            If you do not want to filter reads by length, leave this blank.

    quality :
        ui-name : |
            Minimum Quality
        short-hint : |
            Minimum quality of reads to keep
        long-hint : |
            Minimum quality of reads to keep. Reads with a mean quality below this will be discarded.
            If you do not want to filter reads by quality, leave this blank.

    mingc :
        ui-name : |
            Minimum GC Content
        short-hint : |
            Minimum GC content of reads to keep
        long-hint : |
            Minimum GC content of reads to keep. Reads with a mean GC content below this will be discarded.
            If you do not want to filter reads by GC content, leave this blank.

    maxgc :
        ui-name : |
            Maximum GC Content
        short-hint : |
            Maximum GC content of reads to keep
        long-hint : |
            Maximum GC content of reads to keep. Reads with a mean GC content above this will be discarded.
            If you do not want to filter reads by GC content, leave this blank.
    
    tailcrop :
        ui-name : |     
            Tail Crop
        short-hint : |
            Crop the last N bases from the tail of each read
        long-hint : |
            Crop the last N bases from the tail of each read. This is useful for removing low
            quality bases at the end of reads. If you do not want to crop reads, leave this blank.

    headcrop :
        ui-name : |
            Head Crop
        short-hint : |
            Crop the first N bases from the head of each read
        long-hint : |
            Crop the first N bases from the head of each read. This is useful for removing low
            quality bases at the start of reads. If you do not want to crop reads, leave this blank.
        
    
    output_reads_name :
        ui-name : |
            Output Reads name
        short-hint : |
            Name of error corrected output reads
        long-hint : |
            Name to save the error corrected reads as.
description : |
    <p>Nanoplot is a filter for long reads from Oxford Nanopore sequencers.</p>